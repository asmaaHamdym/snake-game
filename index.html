<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Document encoding and viewport for responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Main container - holds all game content -->
    <div class="container">
        <h1>🐍 Snake Game</h1>

        <!-- Player stats display (score, level, speed) -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Score:</span>
                <span class="stat-value" id="score">0</span> <!-- Updated by JavaScript -->
            </div>
            <div class="stat-item">
                <span class="stat-label">Level:</span>
                <span class="stat-value" id="level">1</span> <!-- Updated by JavaScript -->
            </div>
            <div class="stat-item">
                <span class="stat-label">Speed:</span>
                <span class="stat-value" id="speed">5</span> <!-- Updated by JavaScript -->
            </div>
        </div>

        <!-- Game canvas (400x400 pixel drawing area) - responsive on mobile -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <!-- Mobile touch direction indicators -->
        <div class="touch-controls" id="touchControls">
            <div class="touch-area touch-up" id="touchUp">▲</div>
            <div class="touch-area touch-left" id="touchLeft">◄</div>
            <div class="touch-area touch-right" id="touchRight">►</div>
            <div class="touch-area touch-down" id="touchDown">▼</div>
        </div>

        <!-- Control section with instructions and buttons -->
        <div class="controls">
            <!-- Instructions for player -->
            <p id="instruction" class="instruction">🖥️ Arrow Keys / SPACEBAR | 📱 Swipe or Tap Directions</p>
            <!-- Control buttons -->
            <div class="button-group">
                <button id="startBtn" class="btn btn-primary">Start Game</button>
                <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
                <button id="resetBtn" class="btn btn-danger">Reset</button>
            </div>
        </div>

        <!-- Game over modal - shown when game ends -->
        <div id="gameOverModal" class="modal hidden"> <!-- Hidden by default, shown by JavaScript -->
            <div class="modal-content">
                <h2>Game Over!</h2>
                <!-- Display final stats when game ends -->
                <p>Final Score: <span id="finalScore">0</span></p>
                <p>Final Level: <span id="finalLevel">1</span></p>
                <!-- Restart button -->
                <button id="restartBtn" class="btn btn-primary">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Game logic script -->
    <script src="script.js"></script>
</body>

</html>
